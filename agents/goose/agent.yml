agent_path:
  directories:
    - ~/.config/goose
    - ~/.local/share/goose/
agent_full_name: Goose CLI
agent_homepage: https://goose-docs.ai
build_local: false
base_exclude:
  - alpine
  # `node:lts-slim` uses Debian Bookworm which is too old for Goose
  # Prevents this error:
  # goose: /lib/x86_64-linux-gnu/libc.so.6: version `GLIBC_2.38' not found (required by goose)
  - node
base_distro_exclude:
  - Alpine
