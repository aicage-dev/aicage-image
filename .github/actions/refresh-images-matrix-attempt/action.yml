name: Refresh images matrix attempt
description: Prepare one refresh-images matrix attempt on a single runner.

inputs:
  aicage_version:
    description: Release tag used in final image names.
    required: true
  github_token:
    description: GitHub token used for API and GHCR access.
    required: true
  actor:
    description: GitHub actor used for GHCR login.
    required: true
  event_name:
    description: GitHub event name.
    required: true

outputs:
  MATRIX_IMAGES:
    description: Matrix JSON for images that need a rebuild.
    value: ${{ steps.matrix.outputs.MATRIX_IMAGES }}
  BUILD_COUNT:
    description: Number of images that need a rebuild.
    value: ${{ steps.matrix.outputs.BUILD_COUNT }}

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Install pipeline dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y skopeo

    - name: Log in to GHCR for image checks
      shell: bash
      run: |
        set -euo pipefail
        skopeo login \
          --username "${{ inputs.actor }}" \
          --password "${{ inputs.github_token }}" \
          ghcr.io

    - name: Check whether images need to be built
      id: matrix
      shell: bash
      env:
        AICAGE_VERSION: ${{ inputs.aicage_version }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        ROOT_DIR: ${{ github.workspace }}
        GITHUB_EVENT_NAME: ${{ inputs.event_name }}
      run: |
        set -euo pipefail
        optional_args=""
        if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
          optional_args="--force-build"
        fi
        matrix_json="$(
          scripts/refresh-images/matrix.sh \
            --aicage-version "${AICAGE_VERSION}" \
            ${optional_args}
        )"
        build_count="$(jq -r '.include | length' <<<"${matrix_json}")"
        printf 'MATRIX_IMAGES=%s\n' "${matrix_json}" >> "${GITHUB_OUTPUT}"
        printf 'BUILD_COUNT=%s\n' "${build_count}" >> "${GITHUB_OUTPUT}"
