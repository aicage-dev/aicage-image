name: Refresh Agent Images (Worker Matrix)

"on":
  workflow_call:
    inputs:
      aicage_version:
        description: Release tag used in final image names.
        required: true
        type: string
    outputs:
      STATUS:
        description: Whether the matrix attempt succeeded.
        value: ${{ jobs.prepare-matrix.outputs.STATUS }}
      MATRIX_IMAGES:
        description: Matrix JSON for images that need a rebuild.
        value: ${{ jobs.prepare-matrix.outputs.MATRIX_IMAGES }}
      BUILD_COUNT:
        description: Number of images that need a rebuild.
        value: ${{ jobs.prepare-matrix.outputs.BUILD_COUNT }}

permissions:
  contents: read
  packages: read

jobs:
  prepare-matrix:
    name: Prepare rebuild matrix
    runs-on: ubuntu-latest
    outputs:
      STATUS: ${{ steps.result.outputs.STATUS }}
      MATRIX_IMAGES: ${{ steps.matrix.outputs.MATRIX_IMAGES }}
      BUILD_COUNT: ${{ steps.matrix.outputs.BUILD_COUNT }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run matrix attempt
        id: matrix
        continue-on-error: true
        uses: ./.github/actions/refresh-images-matrix-attempt
        with:
          aicage_version: ${{ inputs.aicage_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          actor: ${{ github.actor }}
          event_name: ${{ github.event_name }}

      - name: Record matrix attempt result
        id: result
        if: ${{ always() }}
        run: |
          set -euo pipefail
          printf 'STATUS=%s\n' "${{ steps.matrix.outcome }}" >> "${GITHUB_OUTPUT}"
