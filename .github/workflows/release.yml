name: Release
run-name: Release (${{ github.ref_name }})

"on":
  push:
    tags:
      - "*"

# Kill running refresh-images.yml workflows
concurrency:
  group: refresh-images
  cancel-in-progress: true

jobs:

  lint:
    uses: ./.github/workflows/lint.yml

  version-image-check:
    name: Check agents version.sh with util-image
    uses: ./.github/workflows/version-image-check.yml

  matrix:
    name: Build matrix
    needs: lint
    uses: ./.github/workflows/prepare-matrix.yml

  test-non-redistributable:
    needs: [matrix, version-image-check]
    uses: ./.github/workflows/test-non-redistributable-agents.yml
    with:
      matrix_images: ${{ needs.matrix.outputs.matrix_nr_images }}

  build-images:
    needs: [matrix, version-image-check, test-non-redistributable]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix_images) }}
    uses: ./.github/workflows/build.yml
    with:
      agent: ${{ matrix.agent }}
      base: ${{ matrix.base }}
      git_ref: ${{ github.ref_name }}
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: [test-non-redistributable, build-images]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: "Release: Package release artifacts"
        run: |
          mkdir dist
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          tar -czf dist/"${REPO_NAME}".tar.gz \
            agents \
            Dockerfile

      - name: "Release: Create SHA256SUMS"
        run: |
          cd dist
          LC_ALL=C find . -maxdepth 1 -type f ! -name 'SHA256SUMS*' -print0 | \
            sort -z | \
            xargs -0 sha256sum \
            > SHA256SUMS

      - name: "Release: Keyless-sign SHA256SUMS"
        run: |
          cd dist
          cosign sign-blob --yes \
            --bundle SHA256SUMS.sigstore.json \
            SHA256SUMS

      - name: "Release: Create GitHub release"
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*
