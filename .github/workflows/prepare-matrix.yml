name: Prepare Matrix
run-name: Prepare matrix (${{ github.ref_name }})

"on":
  workflow_call:
    outputs:
      matrix_images:
        description: Redistributable image matrix
        value: ${{ jobs.matrix.outputs.matrix_images }}
      matrix_nr_images:
        description: Non-redistributable image matrix
        value: ${{ jobs.matrix.outputs.matrix_nr_images }}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RUNNER_AMD64: ubuntu-latest
  RUNNER_ARM64: ubuntu-24.04-arm

jobs:
  matrix:
    name: Build matrix
    runs-on: ubuntu-latest
    env:
      ROOT_DIR: ${{ github.workspace }}
    outputs:
      matrix_images: ${{ steps.set-matrix.outputs.MATRIX_IMAGES }}
      matrix_nr_images: ${{ steps.set-matrix.outputs.MATRIX_NR_IMAGES }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Generate build matrix
        id: set-matrix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          matrix_output="$(scripts/ci/prepare-image-matrix.sh)"
          while IFS='=' read -r key value; do
            [[ -n "${key}" ]] || continue
            printf '%s=%s\n' "${key}" "${value}" >> "$GITHUB_OUTPUT"
          done <<< "${matrix_output}"

      - name: Print image matrix
        env:
          MATRIX_IMAGES: ${{ steps.set-matrix.outputs.MATRIX_IMAGES }}
        run: |
          set -euo pipefail
          printf '%s\n' "${MATRIX_IMAGES}" | jq '.'

      - name: Print non-redistributable matrix
        env:
          MATRIX_NR_IMAGES: ${{ steps.set-matrix.outputs.MATRIX_NR_IMAGES }}
        run: |
          set -euo pipefail
          printf '%s\n' "${MATRIX_NR_IMAGES}" | jq '.'
