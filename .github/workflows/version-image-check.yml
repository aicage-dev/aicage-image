name: Version Image Check

"on":
  workflow_call:
  workflow_dispatch:

jobs:
  version-image-check:
    name: Version image check (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3
      - name: Run version image check
        env:
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
        run: ./scripts/version-image-check.sh
