name: Version Image Check

"on":
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-image-check:
    name: Version image check (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
      - name: Run version image check
        env:
          DOCKER_DEFAULT_PLATFORM: ${{ matrix.platform }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/version-image-check.sh
