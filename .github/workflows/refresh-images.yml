name: Refresh Agent Images (Latest Release Ref)
run-name: Dispatch refresh-images.yml at latest release tag

"on":
  # The scheduler on GitHub is not reliable enough so a cron job at cron-job.org triggers this by workflow_dispatch
  #   schedule:
  #     - cron: "7,27,47 * * * *"
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:

  latest-release-tag:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Get latest release tag
        id: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          AICAGE_VERSION="$(scripts/latest-release-tag.sh)"
          {
            echo "AICAGE_VERSION=${AICAGE_VERSION}"
          } >> "$GITHUB_OUTPUT"
          echo "Latest release tag: ${AICAGE_VERSION}"

      - name: Dispatch refresh worker at release ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.latest.outputs.AICAGE_VERSION }}
        run: |
          set -euo pipefail
          gh workflow run refresh-images-worker.yml --ref "${TAG}" --repo "${GITHUB_REPOSITORY}"
