name: GHCR Cleanup

"on":
  # Weekly on Wednesday at 04:23 UTC
#  schedule:
#    - cron: "23 4 * * 3"
  workflow_dispatch:
    inputs:
      RETENTION_DAYS:
        description: "Retention window in days for cleanup"
        type: number
        default: 30
      RELEASE_TAG_KEEP_COUNT:
        description: "How many latest release tags to keep"
        type: number
        default: 3
      dry_run:
        description: "Run in dry-run mode (recommended first)"
        type: boolean
        default: true
      log_level:
        description: "Action log level"
        type: choice
        options:
          - info
          - debug
          - warn
          - error
        default: info

env:
  # Repo-specific high-level knobs
  PACKAGE_NAME: aicage
  RETENTION_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.RETENTION_DAYS || 30 }}
  RELEASE_TAG_KEEP_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.RELEASE_TAG_KEEP_COUNT || 3 }}
  ROOT_DIR: ${{ github.workspace }}

permissions:
  contents: read
  packages: write

jobs:
  prepare-retention-regex:
    name: Prepare retention regex
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.config.outputs.package_name }}
      retention_days: ${{ steps.config.outputs.retention_days }}
      keep_tags_regex: ${{ steps.regex.outputs.keep_tags_regex }}
      release_list: ${{ steps.regex.outputs.release_list }}
      base_list: ${{ steps.regex.outputs.base_list }}
      agent_list: ${{ steps.regex.outputs.agent_list }}
    steps:
      - name: Export config
        id: config
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "package_name=${PACKAGE_NAME}"
            echo "retention_days=${RETENTION_DAYS}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Build agent/base/release keep-regex
        id: regex
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source scripts/common.sh
          load_config_file

          N="${RELEASE_TAG_KEEP_COUNT}"
          if ! [[ "${N}" =~ ^[0-9]+$ ]] || (( N < 1 )); then
            echo "RELEASE_TAG_KEEP_COUNT must be an integer >= 1, got: ${N}" >&2
            exit 1
          fi

          mapfile -t AGENTS < <(find agents -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          if (( ${#AGENTS[@]} == 0 )); then
            echo "No agent folders found under ./agents" >&2
            exit 1
          fi

          BASES_TMPDIR="$(download_bases_archive)"
          mapfile -t BASES < <(list_base_aliases "${BASES_TMPDIR}/bases")
          if (( ${#BASES[@]} == 0 )); then
            echo "No base aliases found in downloaded bases archive" >&2
            exit 1
          fi

          RELEASES_JSON="$(
            curl \
              -fsSL \
              --retry 8 \
              --retry-all-errors \
              --retry-delay 2 \
              --max-time 300 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100"
          )"

          mapfile -t RELEASES < <(
            printf '%s' "${RELEASES_JSON}" \
              | jq -r '.[] | select(.draft | not) | .tag_name' \
              | sort -V -r \
              | head -n "${N}"
          )

          if (( ${#RELEASES[@]} == 0 )); then
            echo "No GitHub releases found. RELEASE_LIST must be non-empty." >&2
            exit 1
          fi

          ESCAPED_AGENTS=()
          for agent in "${AGENTS[@]}"; do
            escaped_agent="$(printf '%s' "${agent}" | sed -E 's/[][(){}.^$*+?|\\-]/\\\\&/g')"
            ESCAPED_AGENTS+=("${escaped_agent}")
          done

          ESCAPED_BASES=()
          for base in "${BASES[@]}"; do
            escaped_base="$(printf '%s' "${base}" | sed -E 's/[][(){}.^$*+?|\\-]/\\\\&/g')"
            ESCAPED_BASES+=("${escaped_base}")
          done

          ESCAPED_RELEASES=()
          for rel in "${RELEASES[@]}"; do
            escaped_rel="$(printf '%s' "${rel}" | sed -E 's/[][(){}.^$*+?|\\-]/\\\\&/g')"
            ESCAPED_RELEASES+=("${escaped_rel}")
          done

          AGENT_LIST="$(IFS='|'; echo "${ESCAPED_AGENTS[*]}")"
          BASE_LIST="$(IFS='|'; echo "${ESCAPED_BASES[*]}")"
          RELEASE_LIST="$(IFS='|'; echo "${ESCAPED_RELEASES[*]}")"
          KEEP_TAGS_REGEX="^(${AGENT_LIST})(-[0-9]+\\.[0-9]+\\.[0-9]+)?-(${BASE_LIST})(-(${RELEASE_LIST}))?(-arm64|-amd64)?$"

          {
            echo "agent_list=${AGENT_LIST}"
            echo "base_list=${BASE_LIST}"
            echo "release_list=${RELEASE_LIST}"
            echo "keep_tags_regex=${KEEP_TAGS_REGEX}"
          } | tee /dev/stderr >> "${GITHUB_OUTPUT}"

  ghcr-cleanup:
    name: GHCR cleanup
    needs: prepare-retention-regex
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup candidate images
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86  # v1.1.0
        with:
          token: ${{ secrets.GHCR_CLEANUP_PAT != '' && secrets.GHCR_CLEANUP_PAT || github.token }}
          owner: ${{ github.repository_owner }}
          repository: ${{ github.event.repository.name }}
          package: ${{ needs.prepare-retention-regex.outputs.package_name }}
          use-regex: true
          delete-tags: '.*'
          exclude-tags: ${{ needs.prepare-retention-regex.outputs.keep_tags_regex }}
          older-than: ${{ needs.prepare-retention-regex.outputs.retention_days }} days
          delete-untagged: true
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          log-level: ${{ github.event_name == 'workflow_dispatch' && inputs.log_level || 'info' }}
