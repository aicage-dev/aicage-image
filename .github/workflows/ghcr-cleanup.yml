name: GHCR Cleanup

"on":
  # Weekly on Wednesday at 04:23 UTC
  # schedule:
  #   - cron: "23 4 * * 3"
  workflow_dispatch:
    inputs:
      older-than-days:
        description: "Retention window in days for cleanup"
        type: number
        default: 30
      keep-n-tagged:
        description: "How many tags to keep"
        type: number
        default: 3
      dry-run:
        description: "Run in dry-run mode (recommended first)"
        type: boolean
        default: true
      log-level:
        description: "Action log level"
        type: choice
        options:
          - info
          - debug
          - warn
          - error
        default: info

env:
  # Repo-specific high-level knobs
  PACKAGE_NAME: aicage
  ROOT_DIR: ${{ github.workspace }}

permissions:
  contents: read
  packages: write

jobs:
  prepare-retention-regex:
    name: Prepare retention regex
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.config.outputs.package_name }}
      exclude_tags_regex: ${{ steps.regex.outputs.exclude_tags_regex }}
    steps:
      - name: Export config
        id: config
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "package_name=${PACKAGE_NAME}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Build agent/base/release exclude-tags-regex
        id: regex
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source scripts/common.sh
          load_config_file

          regex_escape() {
            printf '%s' "$1" | sed -E 's/[][(){}.^$*+?|\\-]/\\\\&/g'
          }

          readonly SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+$'

          mapfile -t AGENTS < <(find agents -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          if (( ${#AGENTS[@]} == 0 )); then
            echo "No agent folders found under ./agents" >&2
            exit 1
          fi

          BASES_TMPDIR="$(download_bases_archive)"
          mapfile -t BASES < <(list_base_aliases "${BASES_TMPDIR}/bases")
          if (( ${#BASES[@]} == 0 )); then
            echo "No base aliases found in downloaded bases archive" >&2
            exit 1
          fi

          RELEASES_JSON="$(
            curl \
              -fsSL \
              --retry 8 \
              --retry-all-errors \
              --retry-delay 2 \
              --max-time 300 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100"
          )"

          mapfile -t RELEASES < <(
            printf '%s' "${RELEASES_JSON}" \
              | jq -r '.[] | select(.draft | not) | .tag_name' \
              | sort -V -r
          )

          if (( ${#RELEASES[@]} == 0 )); then
            echo "No release tags found. This must be non-empty." >&2
            exit 1
          fi

          ESCAPED_AGENTS=()
          ESCAPED_AGENT_VERSIONS=()
          for agent in "${AGENTS[@]}"; do
            escaped_agent="$(regex_escape "${agent}")"
            ESCAPED_AGENTS+=("${escaped_agent}")

            agent_version="$(agents/"${agent}"/version.sh)"
            if [[ ! "${agent_version}" =~ ${SEMVER_REGEX} ]]; then
              echo "Agent version is not semver for ${agent}: ${agent_version}" >&2
              exit 1
            fi
            escaped_agent_version="$(regex_escape "${agent_version}")"
            ESCAPED_AGENT_VERSIONS+=("${escaped_agent}-${escaped_agent_version}")
          done

          ESCAPED_BASES=()
          for base in "${BASES[@]}"; do
            escaped_base="$(regex_escape "${base}")"
            ESCAPED_BASES+=("${escaped_base}")
          done

          AGENT_LIST="$(IFS='|'; echo "${ESCAPED_AGENTS[*]}")"
          AGENT_VERSION_LIST="$(IFS='|'; echo "${ESCAPED_AGENT_VERSIONS[*]}")"
          BASE_LIST="$(IFS='|'; echo "${ESCAPED_BASES[*]}")"
          CURRENT_AICAGE_VERSION="${RELEASES[0]}"
          if [[ ! "${CURRENT_AICAGE_VERSION}" =~ ${SEMVER_REGEX} ]]; then
            echo "Latest release tag is not semver: ${CURRENT_AICAGE_VERSION}" >&2
            exit 1
          fi
          ESCAPED_CURRENT_AICAGE_VERSION="$(regex_escape "${CURRENT_AICAGE_VERSION}")"
          ARCH_SUFFIX="(?:-(?:arm64|amd64))?"
          AGENT_BASE_TAG="(?:${AGENT_LIST})-(?:${BASE_LIST})"
          RELEASE_TAG="(?:${AGENT_VERSION_LIST})-(?:${BASE_LIST})-${ESCAPED_CURRENT_AICAGE_VERSION}"
          EXCLUDE_TAGS_REGEX="^(?:${AGENT_BASE_TAG}|${RELEASE_TAG})${ARCH_SUFFIX}$"

          {
            echo "exclude_tags_regex=${EXCLUDE_TAGS_REGEX}"
          } | tee /dev/stderr >> "${GITHUB_OUTPUT}"

  ghcr-cleanup:
    name: GHCR cleanup
    needs: prepare-retention-regex
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup candidate images
        # uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86  # v1.1.0
        uses: dataaxiom/ghcr-cleanup-action@84b453158fc987c65595d09cac6b22d47a50ab8d  # main
        # uses: gh-workflow/ghcr-manager@d4b42011baf74f5f59f8b05198372c7ffd0e04b2  # 0.9.6
        with:
          # command: cleanup
          token: ${{ secrets.GHCR_CLEANUP_PAT != '' && secrets.GHCR_CLEANUP_PAT || github.token }}
          owner: ${{ github.repository_owner }}
          repository: ${{ github.event.repository.name }}
          package: ${{ needs.prepare-retention-regex.outputs.package_name }}
          # upload-artifacts: true
          use-regex: true
          delete-tags: '.*'
          keep-n-tagged: ${{ github.event_name == 'workflow_dispatch' && inputs.keep-n-tagged || 3 }}
          exclude-tags: ${{ needs.prepare-retention-regex.outputs.exclude_tags_regex }}
          older-than: ${{ github.event_name == 'workflow_dispatch' && inputs.older-than-days || 30 }} days
          delete-untagged: true
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
          log-level: ${{ github.event_name == 'workflow_dispatch' && inputs.log-level || 'info' }}
