name: Build Agent Image
run-name: Build agent image (${{ inputs.agent }}-${{ inputs.base }})

"on":
  workflow_call:
    inputs:
      base:
        description: Base alias to build (matches bases/<alias>)
        required: true
        type: string
      agent:
        description: Agent alias to build (matches agents/<alias>)
        required: true
        type: string
      git_ref:
        description: Git ref to check out (tag/branch/SHA). Defaults to the workflow ref.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      base:
        description: Base alias to build (matches bases/<alias>)
        required: true
        type: string
      agent:
        description: Agent alias to build (matches agents/<alias>)
        required: true
        type: string
      git_ref:
        description: Git ref to check out (tag/branch/SHA). Defaults to the workflow ref.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  actions: read

env:
  RUNNER_AMD64: ubuntu-latest
  RUNNER_ARM64: ubuntu-24.04-arm

jobs:
  prepare:
    name: "Prepare architecture matrix"
    runs-on: ubuntu-latest
    env:
      BASE_ALIAS: ${{ inputs.base }}
      ROOT_DIR: ${{ github.workspace }}
    outputs:
      BUILD_MATRIX: ${{ steps.matrix.outputs.BUILD_MATRIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Resolve supported architectures
        id: matrix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          matrix_json="$(scripts/ci/base-build-matrix.sh)"
          printf 'BUILD_MATRIX=%s\n' "${matrix_json}" >> "${GITHUB_OUTPUT}"

  build:
    name: "${{ matrix.arch }}: Build and test ${{ inputs.base }}-${{ inputs.agent }}"
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.BUILD_MATRIX) }}
    env:
      PLATFORM: ${{ matrix.platform }}
      ARCH_SUFFIX: ${{ matrix.arch }}
      BASE_ALIAS: ${{ inputs.base }}
      AGENT: ${{ inputs.agent }}
      ROOT_DIR: ${{ github.workspace }}
      AICAGE_VERSION: ${{ inputs.git_ref || github.ref_name }}
    outputs:
      BASE_IMAGE_COSIGN_IDENTITY_REGEXP: ${{ steps.config.outputs.BASE_IMAGE_COSIGN_IDENTITY_REGEXP }}
      BASE_IMAGE_DIGEST: ${{ steps.base-image-digest.outputs.DIGEST }}
      BASE_IMAGE_NAME: ${{ steps.config.outputs.BASE_IMAGE }}
      BASE_IMAGE_SOURCE_URL: ${{ steps.config.outputs.BASE_IMAGE_SOURCE_URL }}
      CREATED: ${{ steps.oci.outputs.created }}
      INDEX_DIGEST_amd64: ${{ steps.out-amd64.outputs.INDEX_DIGEST }}
      INDEX_DIGEST_arm64: ${{ steps.out-arm64.outputs.INDEX_DIGEST }}
      IMAGE_REF: ${{ steps.config.outputs.IMAGE_REF }}
      IMAGE_SOURCE_URL: ${{ steps.config.outputs.IMAGE_SOURCE_URL }}
      REVISION: ${{ steps.oci.outputs.revision }}
      VERSION_TAG: ${{ steps.config.outputs.VERSION_TAG }}
      PURPOSE_TAG: ${{ steps.config.outputs.PURPOSE_TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Resolve OCI labels
        id: oci
        run: |
          set -euo pipefail
          {
            echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "revision=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: "Set up Buildx"
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
        with:
          driver: docker-container

      - name: "Log in to Docker Hub"
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load config file
        id: config
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source scripts/common.sh
          load_config_file
          if is_agent_field_true "${AGENT}" "build_local"; then
            echo "Agent '${AGENT}' is non-redistributable; build.yml should not run for it." >&2
            exit 1
          fi
          AGENT_VERSION="$("agents/${AGENT}/version.sh")"
          if [[ -z "${AGENT_VERSION}" ]]; then
            echo "Agent version is empty for ${AGENT}" >&2
            exit 1
          fi
          BASE_IMAGE="$(get_image_base_ref):${BASE_ALIAS}"
          IMAGE_REF="$(get_image_ref)"
          BASE_IMAGE_SOURCE_URL="$(get_image_base_source_url)"
          BASE_IMAGE_COSIGN_IDENTITY_REGEXP="$(get_image_base_workflow_identity_regexp)"
          IMAGE_SOURCE_URL="$(get_image_source_url)"
          VERSION_TAG="${AGENT}-${AGENT_VERSION}-${BASE_ALIAS}-${AICAGE_VERSION}"
          PURPOSE_TAG="${AGENT}-${BASE_ALIAS}"
          IMAGE_TEST_TAG="${IMAGE_REF}:${VERSION_TAG}-${ARCH_SUFFIX}-test"

          BASES_TMPDIR="$(download_bases_archive)"
          ALLOWED_BASES="$(get_bases "${AGENT}" "${BASES_TMPDIR}/bases" "${BASE_ALIAS}")"
          if ! printf '%s\n' "${ALLOWED_BASES}" | grep -Fxq "${BASE_ALIAS}"; then
            echo "Base '${BASE_ALIAS}' is excluded for agent '${AGENT}'" >&2
            exit 1
          fi
          if ! get_base_architectures "${BASES_TMPDIR}/bases" "${BASE_ALIAS}" | grep -Fxq "${ARCH_SUFFIX}"; then
            echo "Base '${BASE_ALIAS}' does not support architecture '${ARCH_SUFFIX}'" >&2
            exit 1
          fi
          {
            echo "BASE_IMAGE=${BASE_IMAGE}"
            echo "BASE_IMAGE_COSIGN_IDENTITY_REGEXP=${BASE_IMAGE_COSIGN_IDENTITY_REGEXP}"
            echo "BASE_IMAGE_SOURCE_URL=${BASE_IMAGE_SOURCE_URL}"
            echo "IMAGE_REF=${IMAGE_REF}"
            echo "IMAGE_SOURCE_URL=${IMAGE_SOURCE_URL}"
            echo "VERSION_TAG=${VERSION_TAG}"
            echo "PURPOSE_TAG=${PURPOSE_TAG}"
            echo "IMAGE_TEST_TAG=${IMAGE_TEST_TAG}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "BASE_IMAGE=${BASE_IMAGE}"
            echo "BASE_IMAGE_COSIGN_IDENTITY_REGEXP=${BASE_IMAGE_COSIGN_IDENTITY_REGEXP}"
            echo "BASE_IMAGE_SOURCE_URL=${BASE_IMAGE_SOURCE_URL}"
            echo "IMAGE_REF=${IMAGE_REF}"
            echo "IMAGE_SOURCE_URL=${IMAGE_SOURCE_URL}"
            echo "VERSION_TAG=${VERSION_TAG}"
            echo "PURPOSE_TAG=${PURPOSE_TAG}"
            echo "IMAGE_TEST_TAG=${IMAGE_TEST_TAG}"
          } >> "$GITHUB_ENV"

      - name: Resolve base image digest
        id: base-image-digest
        run: |
          set -euo pipefail
          digest="$(docker buildx imagetools inspect "${BASE_IMAGE}" --format '{{json .Manifest}}' | jq -r '.digest')"
          if [[ -z "${digest}" ]]; then
            echo "Failed to resolve digest for ${BASE_IMAGE}" >&2
            exit 1
          fi
          {
            echo "DIGEST=${digest}"
            echo "BASE_IMAGE_DIGEST_REF=${BASE_IMAGE}@${digest}"
          } | tee /dev/stderr >> "$GITHUB_OUTPUT"
          {
            echo "BASE_IMAGE_DIGEST_REF=${BASE_IMAGE}@${digest}"
          } | tee /dev/stderr >> "$GITHUB_ENV"

      - name: Verify base image signature
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "${BASE_IMAGE_COSIGN_IDENTITY_REGEXP}" \
            "${{ env.BASE_IMAGE_DIGEST_REF }}"

      - name: Verify base image manifest annotations
        run: |
          set -euo pipefail
          expected_source="${BASE_IMAGE_SOURCE_URL}"
          docker buildx imagetools inspect \
            --raw "${{ env.BASE_IMAGE_DIGEST_REF }}" \
            | jq -e \
              --arg expected_source "$expected_source" '
              .annotations["org.opencontainers.image.source"] == $expected_source
              and .annotations["org.opencontainers.image.title"] == "aicage-image-base"
            ' >/dev/null

      - name: Build test image tag
        id: build_image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE_DIGEST_REF }}
            AGENT=${{ env.AGENT }}
            IMAGE_SOURCE_URL=${{ env.IMAGE_SOURCE_URL }}
          tags: |
            ${{ steps.config.outputs.IMAGE_TEST_TAG }}
          labels: |
            org.opencontainers.image.description=Agent image for ${{ env.AGENT }}
            org.opencontainers.image.revision=${{ steps.oci.outputs.revision }}
            org.opencontainers.image.created=${{ steps.oci.outputs.created }}
            org.opencontainers.image.version=${{ steps.config.outputs.VERSION_TAG }}
            org.opencontainers.image.base.name=${{ steps.config.outputs.BASE_IMAGE }}
            org.opencontainers.image.base.digest=${{ steps.base-image-digest.outputs.DIGEST }}

      - name: Prepare vars to remove test tag
        id: untag_vars
        run: |
          set -euo pipefail
          image_path="${IMAGE_REF#*/}"
          {
            echo "image_owner=${image_path%%/*}"
            echo "image_package=${image_path#*/}"
            echo "image_test_tag_name=${IMAGE_TEST_TAG##*:}"
          } >> "$GITHUB_OUTPUT"

      - name: Remove test tag on image
        uses: ghcr-manager/ghcr-untag-action@ab3e570fdd6d67415ed325bedf29f3ec0777add1  # v1.0.6
        with:
          token: ${{ github.token }}
          owner: ${{ steps.untag_vars.outputs.image_owner }}
          package: ${{ steps.untag_vars.outputs.image_package }}
          tags: ${{ steps.untag_vars.outputs.image_test_tag_name }}

      - name: "Test: Pull final image for local tests"
        run: |
          set -euo pipefail
          docker pull "${IMAGE_REF}@${{ steps.build_image.outputs.digest }}"

      - name: "Test: Verify OCI labels on final image"
        run: |
          set -euo pipefail
          expected_description="Agent image for ${{ env.AGENT }}"
          expected_revision="${{ steps.oci.outputs.revision }}"
          expected_created="${{ steps.oci.outputs.created }}"
          expected_version="${{ steps.config.outputs.VERSION_TAG }}"
          docker image inspect "${IMAGE_REF}@${{ steps.build_image.outputs.digest }}" \
            | jq -e \
              --arg expected_description "$expected_description" \
              --arg expected_revision "$expected_revision" \
              --arg expected_created "$expected_created" \
              --arg expected_version "$expected_version" '
              .[0].Config.Labels["org.opencontainers.image.description"]
                == $expected_description
              and .[0].Config.Labels["org.opencontainers.image.revision"] == $expected_revision
              and .[0].Config.Labels["org.opencontainers.image.created"] == $expected_created
              and .[0].Config.Labels["org.opencontainers.image.version"] == $expected_version
            ' >/dev/null

      - name: "Test: Verify base provenance labels on final image"
        run: |
          set -euo pipefail
          expected_base_name="${{ steps.config.outputs.BASE_IMAGE }}"
          expected_base_digest="${{ steps.base-image-digest.outputs.DIGEST }}"
          docker image inspect "${IMAGE_REF}@${{ steps.build_image.outputs.digest }}" \
            | jq -e \
              --arg expected_base_name "$expected_base_name" \
              --arg expected_base_digest "$expected_base_digest" '
              .[0].Config.Labels["org.opencontainers.image.base.name"] == $expected_base_name
              and .[0].Config.Labels["org.opencontainers.image.base.digest"] == $expected_base_digest
            ' >/dev/null

      - name: "Test: Setup BATS testing framework"
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43  # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Test: Run smoke suites on final image"
        run: |
          set -euo pipefail
          scripts/test.sh \
            --image "${IMAGE_REF}@${{ steps.build_image.outputs.digest }}" \
            --agent "${AGENT}"

      - name: Export digest (amd64)
        id: out-amd64
        if: matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          (
            echo "INDEX_DIGEST=${{ steps.build_image.outputs.digest }}"
          ) | tee /dev/stderr >> "$GITHUB_OUTPUT"

      - name: Export digest (arm64)
        id: out-arm64
        if: matrix.arch == 'arm64'
        run: |
          set -euo pipefail
          (
            echo "INDEX_DIGEST=${{ steps.build_image.outputs.digest }}"
          ) | tee /dev/stderr >> "$GITHUB_OUTPUT"

  multiarch:
    name: Run multi-arch sign/provenance/publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to the container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare digests for multi-arch publish action
        id: platform-digests
        run: |
          set -euo pipefail
          platform_digests_file="$(mktemp)"
          if [[ -n "${{ needs.build.outputs.INDEX_DIGEST_amd64 }}" ]]; then
            printf '%s\n' "linux/amd64=${{ needs.build.outputs.INDEX_DIGEST_amd64 }}" >> "${platform_digests_file}"
          fi
          if [[ -n "${{ needs.build.outputs.INDEX_DIGEST_arm64 }}" ]]; then
            printf '%s\n' "linux/arm64=${{ needs.build.outputs.INDEX_DIGEST_arm64 }}" >> "${platform_digests_file}"
          fi
          if [[ ! -s "${platform_digests_file}" ]]; then
            echo "No platform digests produced for ${{ inputs.base }}/${{ inputs.agent }}" >&2
            exit 1
          fi
          {
            echo 'PLATFORM_DIGESTS<<EOF'
            cat "${platform_digests_file}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Use multi-arch publish action
        id: publish
        uses: gh-workflow/multiarch-image-publish@c5eac5dd8f7ed6b39fffc6e2c2242966b4917260  # 0.2.1
        with:
          image_ref: ${{ needs.build.outputs.IMAGE_REF }}
          tags: |
            ${{ needs.build.outputs.VERSION_TAG }}
            ${{ needs.build.outputs.PURPOSE_TAG }}
          platform_digests: ${{ steps.platform-digests.outputs.PLATFORM_DIGESTS }}
          annotations: |
            org.opencontainers.image.title=aicage
            org.opencontainers.image.description=Agent image for ${{ inputs.agent }}
            org.opencontainers.image.source=${{ needs.build.outputs.IMAGE_SOURCE_URL }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ needs.build.outputs.REVISION }}
            org.opencontainers.image.created=${{ needs.build.outputs.CREATED }}
            org.opencontainers.image.version=${{ needs.build.outputs.VERSION_TAG }}
            org.opencontainers.image.base.name=${{ needs.build.outputs.BASE_IMAGE_NAME }}
            org.opencontainers.image.base.digest=${{ needs.build.outputs.BASE_IMAGE_DIGEST }}

      - name: Verify base provenance annotations on published manifest
        run: |
          set -euo pipefail
          expected_base_name="${{ needs.build.outputs.BASE_IMAGE_NAME }}"
          expected_base_digest="${{ needs.build.outputs.BASE_IMAGE_DIGEST }}"
          expected_description="Agent image for ${{ inputs.agent }}"
          expected_revision="${{ needs.build.outputs.REVISION }}"
          expected_created="${{ needs.build.outputs.CREATED }}"
          expected_version="${{ needs.build.outputs.VERSION_TAG }}"
          docker buildx imagetools inspect \
            --raw "${{ needs.build.outputs.IMAGE_REF }}@${{ steps.publish.outputs.manifest_digest }}" \
            | jq -e \
              --arg expected_base_name "$expected_base_name" \
              --arg expected_base_digest "$expected_base_digest" \
              --arg expected_description "$expected_description" \
              --arg expected_revision "$expected_revision" \
              --arg expected_created "$expected_created" \
              --arg expected_version "$expected_version" '
              .annotations["org.opencontainers.image.title"] == "aicage"
              and .annotations["org.opencontainers.image.description"] == $expected_description
              and .annotations["org.opencontainers.image.source"] == "${{ needs.build.outputs.IMAGE_SOURCE_URL }}"
              and .annotations["org.opencontainers.image.licenses"] == "Apache-2.0"
              and .annotations["org.opencontainers.image.revision"] == $expected_revision
              and .annotations["org.opencontainers.image.created"] == $expected_created
              and .annotations["org.opencontainers.image.version"] == $expected_version
              and .annotations["org.opencontainers.image.base.name"] == $expected_base_name
              and .annotations["org.opencontainers.image.base.digest"] == $expected_base_digest
            ' >/dev/null
