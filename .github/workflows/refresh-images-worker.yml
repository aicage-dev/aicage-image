name: Refresh Agent Images (Agent Versions)
run-name: Refresh agent-version images (${{ github.ref_name }})

"on":
  # The scheduler on GitHub is not reliable enough so a cron job at cron-job.org triggers this by workflow_dispatch
  #   schedule:
  #     - cron: "7,27,47 * * * *"
  workflow_dispatch: {}

concurrency:
  group: refresh-images
  cancel-in-progress: false

jobs:
  freshness-check:
    name: Check release freshness
    runs-on: ubuntu-latest
    outputs:
      SHOULD_REFRESH: ${{ steps.check.outputs.SHOULD_REFRESH }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check latest release tag
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_tag="$(scripts/latest-release-tag.sh)"
          if [[ "${release_tag}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Skipping stale refresh for ${GITHUB_REF_NAME}; latest release is ${release_tag}."
            echo "SHOULD_REFRESH=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Refreshing latest release ${release_tag}."
          echo "SHOULD_REFRESH=true" >> "$GITHUB_OUTPUT"

  refresh:
    name: Refresh agent/base images for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    needs: freshness-check
    if: ${{ needs.freshness-check.outputs.SHOULD_REFRESH == 'true' }}
    outputs:
      MATRIX_IMAGES: ${{ steps.matrix.outputs.MATRIX_IMAGES }}
      BUILD_COUNT: ${{ steps.matrix.outputs.BUILD_COUNT }}
    env:
      AICAGE_VERSION: ${{ github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ROOT_DIR: ${{ github.workspace }}
    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Install pipeline dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Log in to GHCR for image checks
        run: |
          set -euo pipefail
          skopeo login \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            ghcr.io

      - name: Check whether images need to be built
        id: matrix
        run: |
          set -euo pipefail
          optional_args=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            optional_args="--force-build"
          fi
          matrix_json="$(
            scripts/refresh-images/matrix.sh \
              --aicage-version "${AICAGE_VERSION}" \
              ${optional_args}
          )"
          build_count="$(jq -r '.include | length' <<<"${matrix_json}")"
          printf 'MATRIX_IMAGES=%s\n' "${matrix_json}" >> "${GITHUB_OUTPUT}"
          printf 'BUILD_COUNT=%s\n' "${build_count}" >> "${GITHUB_OUTPUT}"

  build-images:
    name: Build needed images
    needs:
      - freshness-check
      - refresh
    if: ${{ needs.freshness-check.outputs.SHOULD_REFRESH == 'true' && needs.refresh.outputs.BUILD_COUNT != '0' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.refresh.outputs.MATRIX_IMAGES) }}
    uses: ./.github/workflows/build.yml
    with:
      git_ref: ${{ github.ref_name }}
      agent: ${{ matrix.agent }}
      base: ${{ matrix.base }}
    secrets: inherit
