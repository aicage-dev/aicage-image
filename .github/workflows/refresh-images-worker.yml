name: Refresh Agent Images (Agent Versions)
run-name: Refresh agent-version images (${{ github.ref_name }})

"on":
  # The scheduler on GitHub is not reliable enough so a cron job at cron-job.org triggers this by workflow_dispatch
  #   schedule:
  #     - cron: "7,27,47 * * * *"
  workflow_dispatch: {}

concurrency:
  group: refresh-images
  cancel-in-progress: false

jobs:
  freshness:
    name: Check release freshness
    runs-on: ubuntu-latest
    outputs:
      SHOULD_REFRESH: ${{ steps.check.outputs.SHOULD_REFRESH }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check latest release tag
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_tag="$(scripts/latest-release-tag.sh)"
          if [[ "${release_tag}" == "${GITHUB_REF_NAME}" ]]; then
            echo "Refreshing latest release ${release_tag}."
            echo "SHOULD_REFRESH=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping stale refresh for ${GITHUB_REF_NAME}; latest release is ${release_tag}."
            echo "SHOULD_REFRESH=false" >> "$GITHUB_OUTPUT"
          fi

  matrix:
    name: Prepare rebuild matrix for ${{ github.ref_name }}
    needs: freshness
    if: ${{ needs.freshness.outputs.SHOULD_REFRESH == 'true' }}
    uses: ./.github/workflows/refresh-images-worker-matrix.yml
    with:
      aicage_version: ${{ github.ref_name }}
    secrets: inherit

  matrix-retry:
    name: Retry rebuild matrix for ${{ github.ref_name }}
    needs:
      - freshness
      - matrix
    if: >-
      ${{
        always() &&
        needs.freshness.outputs.SHOULD_REFRESH == 'true' &&
        needs.matrix.outputs.STATUS != 'success'
      }}
    uses: ./.github/workflows/refresh-images-worker-matrix.yml
    with:
      aicage_version: ${{ github.ref_name }}
    secrets: inherit

  matrix-result:
    name: Collect matrix result
    runs-on: ubuntu-latest
    needs:
      - freshness
      - matrix
      - matrix-retry
    if: ${{ always() }}
    outputs:
      MATRIX_IMAGES: ${{ steps.select.outputs.MATRIX_IMAGES }}
      BUILD_COUNT: ${{ steps.select.outputs.BUILD_COUNT }}
    steps:
      - name: Select successful refresh outputs
        id: select
        run: |
          set -euo pipefail
          matrix_images=""
          build_count=""

          if [[ "${{ needs.freshness.outputs.SHOULD_REFRESH }}" != "true" ]]; then
            matrix_images='{"include":[]}'
            build_count='0'
          elif [[ "${{ needs.matrix.outputs.STATUS }}" == "success" ]]; then
            matrix_images='${{ needs.matrix.outputs.MATRIX_IMAGES }}'
            build_count='${{ needs.matrix.outputs.BUILD_COUNT }}'
          elif [[ "${{ needs.matrix-retry.outputs.STATUS }}" == "success" ]]; then
            matrix_images='${{ needs.matrix-retry.outputs.MATRIX_IMAGES }}'
            build_count='${{ needs.matrix-retry.outputs.BUILD_COUNT }}'
          else
            echo "Both matrix preparation attempts failed." >&2
            exit 1
          fi

          printf 'MATRIX_IMAGES=%s\n' "${matrix_images}" >> "${GITHUB_OUTPUT}"
          printf 'BUILD_COUNT=%s\n' "${build_count}" >> "${GITHUB_OUTPUT}"

  build-images:
    name: Build needed images
    needs:
      - freshness
      - matrix-result
    if: >-
      ${{
        always() &&
        needs.freshness.outputs.SHOULD_REFRESH == 'true' &&
        needs.matrix-result.outputs.BUILD_COUNT != '0'
      }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-result.outputs.MATRIX_IMAGES) }}
    uses: ./.github/workflows/build.yml
    with:
      git_ref: ${{ github.ref_name }}
      agent: ${{ matrix.agent }}
      base: ${{ matrix.base }}
    secrets: inherit
