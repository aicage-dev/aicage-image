name: Refresh Agent Images (Agent Versions)
run-name: Refresh agent-version images (${{ github.ref_name }})

"on":
  # The scheduler on GitHub is not reliable enough so a cron job at cron-job.org triggers this by workflow_dispatch
  #   schedule:
  #     - cron: "7,27,47 * * * *"
  workflow_dispatch: {}

concurrency:
  group: refresh-images
  cancel-in-progress: false

jobs:
  freshness-check:
    name: Check release freshness
    runs-on: ubuntu-latest
    outputs:
      SHOULD_REFRESH: ${{ steps.check.outputs.SHOULD_REFRESH }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check latest release tag
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_tag="$(scripts/latest-release-tag.sh)"
          if [[ "${release_tag}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Skipping stale refresh for ${GITHUB_REF_NAME}; latest release is ${release_tag}."
            echo "SHOULD_REFRESH=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Refreshing latest release ${release_tag}."
          echo "SHOULD_REFRESH=true" >> "$GITHUB_OUTPUT"

  refresh:
    name: Refresh agent/base images for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    needs: freshness-check
    if: ${{ needs.freshness-check.outputs.SHOULD_REFRESH == 'true' }}
    outputs:
      MATRIX_IMAGES: ${{ steps.matrix.outputs.MATRIX_IMAGES }}
      BUILD_COUNT: ${{ steps.matrix.outputs.BUILD_COUNT }}
    env:
      AICAGE_VERSION: ${{ github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ROOT_DIR: ${{ github.workspace }}
    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Install pipeline dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Log in to GHCR for image checks
        run: |
          set -euo pipefail
          skopeo login \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            ghcr.io

      - name: Check whether images need to be built
        id: matrix
        run: |
          set -euo pipefail
          source scripts/common.sh
          source scripts/refresh-images-lib.sh
          load_config_file

          MAX_PARALLEL="${REFRESH_CHECKS_PARALLELISM:-12}"
          FORCE_BUILD="false"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            FORCE_BUILD="true"
          fi

          BASES_TMPDIR="$(download_bases_archive)"
          LOG_DIR="$(mktemp -d)"
          BUILD_LIST="$(mktemp)"
          BUILD_LIST_LOCK="$(mktemp)"
          BASE_METADATA_FILE="$(mktemp)"
          error_count=0
          pids=()
          declare -A pid_to_log pid_to_label

          log_name() {
            printf '%s' "$1" | tr -c '[:alnum:]_.-' '_'
          }

          append_build() {
            local agent="$1"
            local base_alias="$2"

            flock "${BUILD_LIST_LOCK}" \
              bash -c 'printf "%s\t%s\n" "$1" "$2" >> "$3"' \
              _ \
              "${agent}" \
              "${base_alias}" \
              "${BUILD_LIST}"
          }

          needs_rebuild_status() {
            local agent="$1"
            local base_alias="$2"
            local agent_version="$3"
            local status

            set +e
            NEEDS_REBUILD_OUTPUT="$(
              needs_rebuild \
                "${base_alias}" \
                "${agent}-${agent_version}-${base_alias}-${AICAGE_VERSION}" \
                "${BASE_METADATA_FILE}" 2>&1
            )"
            status=$?
            set -e

            return "${status}"
          }

          print_needs_rebuild_output() {
            [[ -n "${NEEDS_REBUILD_OUTPUT}" ]] || return 0
            printf '%s\n' "${NEEDS_REBUILD_OUTPUT}" | sed 's/^/  /'
          }

          report_pid_result() {
            local pid="$1"
            local status="$2"

            if [[ "${status}" -ne 0 ]]; then
              error_count=$((error_count + 1))
              echo "Check failed: ${pid_to_label[${pid}]}" >&2
              sed 's/^/  /' "${pid_to_log[${pid}]}" >&2
            else
              cat "${pid_to_log[${pid}]}"
            fi
          }

          wait_for_slot() {
            local finished_pid status

            if [[ "${#pids[@]}" -ge "${MAX_PARALLEL}" ]]; then
              if wait -n -p finished_pid; then
                status=0
              else
                status=$?
              fi
              report_pid_result "${finished_pid}" "${status}"
              mapfile -t pids < <(jobs -p)
            fi
          }

          run_check() {
            local agent="$1"
            local base_alias="$2"
            local agent_version="$3"

            if [[ "${FORCE_BUILD}" == "true" ]]; then
              echo "Forcing build for ${agent} (${base_alias}) due to ${GITHUB_EVENT_NAME}"
              append_build "${agent}" "${base_alias}"
              return 0
            fi

            local status
            if needs_rebuild_status "${agent}" "${base_alias}" "${agent_version}"; then
              status=0
            else
              status=$?
            fi
            case "${status}" in
              0)
                if [[ -n "${NEEDS_REBUILD_OUTPUT}" ]]; then
                  echo "Rebuild reason for ${agent} (${base_alias}):"
                  print_needs_rebuild_output
                fi
                echo "Needs build ${agent} (${base_alias}) for ${AICAGE_VERSION}"
                append_build "${agent}" "${base_alias}"
                return 0
                ;;
              1)
                echo "Up-to-date ${agent} (${base_alias})"
                return 0
                ;;
              *)
                if [[ -n "${NEEDS_REBUILD_OUTPUT}" ]]; then
                  print_needs_rebuild_output >&2
                fi
                echo "Failed to determine rebuild for ${agent} (${base_alias})" >&2
                return 1
                ;;
            esac
          }

          if ! load_base_metadata_file "${BASE_METADATA_FILE}" "${BASES_TMPDIR}/bases"; then
            echo "Failed to load base metadata." >&2
            exit 1
          fi

          for dir in agents/*; do
            [ -d "${dir}" ] || continue
            AGENT="$(basename "${dir}")"
            if is_agent_field_true "${AGENT}" build_local; then
              echo "Skipping non-redistributable agent ${AGENT}"
              continue
            fi
            AGENT_VERSION="$(agents/${AGENT}/version.sh)"
            if [[ -z "${AGENT_VERSION}" ]]; then
              echo "Agent version is empty for ${AGENT}" >&2
              exit 1
            fi
            BASE_ALIASES="$(get_bases "${AGENT}" "${BASES_TMPDIR}/bases")"

            for BASE_ALIAS in ${BASE_ALIASES}; do
              log_file="${LOG_DIR}/$(log_name "${AGENT}_${BASE_ALIAS}").log"
              run_check "${AGENT}" "${BASE_ALIAS}" "${AGENT_VERSION}" >"${log_file}" 2>&1 &
              pid="$!"
              pids+=("${pid}")
              pid_to_log["${pid}"]="${log_file}"
              pid_to_label["${pid}"]="${AGENT} (${BASE_ALIAS})"

              wait_for_slot
            done
          done

          for pid in "${pids[@]}"; do
            if wait "${pid}"; then
              report_pid_result "${pid}" 0
            else
              report_pid_result "${pid}" $?
            fi
          done

          if [[ "${error_count}" -gt 0 ]]; then
            echo "Refresh checks reported ${error_count} error(s)." >&2
            exit 1
          fi

          build_matrix_file="$(mktemp)"
          echo '{"include":[]}' > "${build_matrix_file}"
          while IFS=$'\t' read -r agent base_alias; do
            [[ -n "${agent}" ]] || continue
            jq -c \
              --arg agent "${agent}" \
              --arg base "${base_alias}" \
              '
                .include += [
                  {
                    "agent": $agent,
                    "base": $base
                  }
                ]
              ' \
              "${build_matrix_file}" > "${build_matrix_file}.tmp"
            mv "${build_matrix_file}.tmp" "${build_matrix_file}"
          done < "${BUILD_LIST}"

          build_count="$(jq -r '.include | length' "${build_matrix_file}")"
          if [[ "${build_count}" -eq 0 ]]; then
            echo "No image rebuilds required."
          fi
          build_matrix_json="$(cat "${build_matrix_file}")"
          echo "Build matrix:"
          jq '.' "${build_matrix_file}"
          {
            printf 'MATRIX_IMAGES=%s\n' "${build_matrix_json}"
            printf 'BUILD_COUNT=%s\n' "${build_count}"
          } >> "$GITHUB_OUTPUT"

  build-images:
    name: Build needed images
    needs:
      - freshness-check
      - refresh
    if: ${{ needs.freshness-check.outputs.SHOULD_REFRESH == 'true' && needs.refresh.outputs.BUILD_COUNT != '0' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.refresh.outputs.MATRIX_IMAGES) }}
    uses: ./.github/workflows/build.yml
    with:
      git_ref: ${{ github.ref_name }}
      agent: ${{ matrix.agent }}
      base: ${{ matrix.base }}
    secrets: inherit
